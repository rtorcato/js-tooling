# Bun configuration — https://bun.sh/docs/runtime/bunfig
# Tune to taste; this is a minimal, Node-compatible-library-friendly default.

[install]
# Fail the install if the lockfile would change in CI (mirrors --frozen-lockfile).
frozenLockfile = false
# Pin exact versions on `bun add` for reproducible installs.
exact = true

[test]
# Enable coverage with `bun test --coverage`; leave off by default for speed.
coverage = false
# Directories/globs Bun's test runner discovers (matches the tests/ convention).
root = "."
