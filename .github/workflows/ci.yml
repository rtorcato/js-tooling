name: 🚀 CI/CD Pipeline

on:
  push:
    branches: [main, release, ci-testing]
  pull_request:
    branches: [main]
  workflow_dispatch:
    # Allow manual triggers

    # Prevent concurrent runs on same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Skip CI if commit message contains [skip ci] or [ci skip]
  check-skip:
    runs-on: ubuntu-latest
    outputs:
      should-skip: ${{ steps.skip-check.outputs.should-skip }}
    steps:
      - name: Check for skip CI
        id: skip-check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          echo "Commit message: $COMMIT_MSG"
          if [[ "$COMMIT_MSG" == *"[skip ci]"* || "$COMMIT_MSG" == *"[ci skip]"* ]]; then
            echo "✅ Found skip CI directive - skipping pipeline"
            echo "should-skip=true" >> $GITHUB_OUTPUT
          else
            echo "🚀 No skip CI directive found - running pipeline"
            echo "should-skip=false" >> $GITHUB_OUTPUT
          fi

  # Install dependencies and cache them
  dependencies:
    runs-on: ubuntu-latest
    needs: check-skip
    if: needs.check-skip.outputs.should-skip != 'true'
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v7

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v6

      - name: 📦 Generate cache key
        id: cache-key
        run: echo "key=${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}" >> $GITHUB_OUTPUT

      - name: 📦 Cache dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

  # Linting and code quality
  lint:
    runs-on: ubuntu-latest
    needs: [dependencies, check-skip]
    if: needs.check-skip.outputs.should-skip != 'true'
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v7

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v6

      - name: 📦 Restore dependencies cache
        uses: actions/cache@v6
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ needs.dependencies.outputs.cache-key }}

      - name: 🔍 Run linting
        run: pnpm lint

  # Commit message validation
  commitlint:
    runs-on: ubuntu-latest
    needs: [dependencies, check-skip]
    if: needs.check-skip.outputs.should-skip != 'true' && github.event_name == 'push'
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v6

      - name: 📦 Restore dependencies cache
        uses: actions/cache@v6
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ needs.dependencies.outputs.cache-key }}

      - name: 🔍 Validate commit messages
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # For push events, validate the latest commit
            echo "Validating latest commit message..."
            git log -1 --pretty=format:"%s" | npx commitlint
          else
            echo "Skipping commitlint for non-push events"
          fi

  # Type checking
  typecheck:
    runs-on: ubuntu-latest
    needs: [dependencies, check-skip]
    if: needs.check-skip.outputs.should-skip != 'true'
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v7

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v6

      - name: 📦 Restore dependencies cache
        uses: actions/cache@v6
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ needs.dependencies.outputs.cache-key }}

      - name: 🔍 Type check
        run: pnpm typecheck

  # Variable validation
  varcheck:
    runs-on: ubuntu-latest
    needs: [dependencies, check-skip]
    if: needs.check-skip.outputs.should-skip != 'true'
    steps:
      - name: 🔍 Check environment variables
        run: |
          echo "GITHUB_REF: ${{ github.ref }}"
          echo "GITHUB_SHA: ${{ github.sha }}"
          echo "GITHUB_EVENT_NAME: ${{ github.event_name }}"
          echo "GITHUB_ACTOR: ${{ github.actor }}"

          if [ -z "${{ secrets.GITHUB_TOKEN }}" ]; then
            echo "❌ GITHUB_TOKEN is not set"
            exit 1
          else
            echo "✅ GITHUB_TOKEN is available"
          fi

          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "⚠️  NPM_TOKEN is not set - required for publishing"
            echo "   Add NPM_TOKEN to repository secrets for publishing to work"
          else
            echo "✅ NPM_TOKEN is available"
          fi

  # Testing — run on every supported Node major
  test:
    runs-on: ubuntu-latest
    needs: [check-skip]
    if: needs.check-skip.outputs.should-skip != 'true'
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22", "24"]
    name: test (node ${{ matrix.node-version }})
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v7

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v6

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🧪 Run tests
        if: matrix.node-version != '22'
        run: pnpm test --run

      - name: 🧪 Run tests with coverage
        if: matrix.node-version == '22'
        run: pnpm coverage

      - name: 📊 Upload coverage
        if: matrix.node-version == '22'
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage/coverage-summary.json
          fail_ci_if_error: false

  # Build
  build:
    runs-on: ubuntu-latest
    needs: [dependencies, check-skip]
    if: needs.check-skip.outputs.should-skip != 'true'
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v7

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v6

      - name: 📦 Restore dependencies cache
        uses: actions/cache@v6
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ needs.dependencies.outputs.cache-key }}

      - name: 🏗️ Build project
        run: pnpm build-cli

      - name: 📦 Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts
          path: |
            dist/
            package.json
            README.md
            pnpm-lock.yaml
          retention-days: 7

  # Release and publish
  release:
    runs-on: ubuntu-latest
    needs: [dependencies, lint, typecheck, test, build, commitlint, varcheck, check-skip]
    if: |
      always() &&
      needs.check-skip.outputs.should-skip != 'true' &&
      github.ref == 'refs/heads/main' &&
      needs.dependencies.result == 'success' &&
      needs.lint.result == 'success' &&
      needs.typecheck.result == 'success' &&
      needs.test.result == 'success' &&
      needs.build.result == 'success' &&
      needs.varcheck.result == 'success' &&
      (needs.commitlint.result == 'success' || needs.commitlint.result == 'skipped')
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Fetch full history for semantic-release
          # RELEASE_TOKEN is an admin PAT so semantic-release can push the
          # version commit + tag to a protected main (github-actions[bot]
          # can't bypass branch protection). Falls back to GITHUB_TOKEN.
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v6

      - name: 📦 Restore dependencies cache
        uses: actions/cache@v6
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ needs.dependencies.outputs.cache-key }}

      - name: 🔧 Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: 🏗️ Build CLI
        run: pnpm run build-cli

      - name: 🚀 Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release
