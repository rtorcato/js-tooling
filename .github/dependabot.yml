version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
      day: 1
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    versioning-strategy: increase
    commit-message:
      prefix: chore
      include: scope
    groups:
      # minor + patch, split prod/dev — the auto-merge tier (green-gated).
      production-minor:
        dependency-type: production
        update-types:
          - minor
          - patch
      dev-minor:
        dependency-type: development
        update-types:
          - minor
          - patch
      # one PR per ecosystem for all majors — triaged monthly, never auto-merged.
      major-updates:
        update-types:
          - major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: 1
    commit-message:
      prefix: ci
      include: scope
